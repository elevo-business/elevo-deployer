<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ELEVO Deploy Center</title>
<link rel="icon" href="data:image/svg+xml,<svg viewBox='0 0 36 36' xmlns='http://www.w3.org/2000/svg'><circle cx='18' cy='18' r='16' fill='%2305070E' stroke='%233B82F6' stroke-width='1'/><path d='M18 8L25 19' stroke='%233B82F6' stroke-width='2.2' stroke-linecap='round'/><path d='M18 8L11 19' stroke='%233B82F6' stroke-width='2.2' stroke-linecap='round'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#05070E;--bg2:#0A0E1A;--sf:#111827;--sfh:#1A2035;--bd:#1E2A42;--tx:#E2E8F0;--mt:#8899B0;--dm:#516179;--ac:#3B82F6;--ach:#2563EB;--gn:#10B981;--og:#F59E0B;--rd:#EF4444;--r:14px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:Outfit,sans-serif;font-weight:300;min-height:100vh;min-height:100dvh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
::selection{background:var(--ac);color:#fff}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
input,textarea,button,select{font-family:inherit}

/* Header */
header{position:sticky;top:0;z-index:100;background:rgba(5,7,14,.9);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,255,255,.04);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:Sora;font-weight:700;font-size:16px;letter-spacing:.22em;display:flex;align-items:center;gap:8px}
.logo b{color:var(--ac)}
.logo svg{width:24px;height:24px}
.hdr-r{display:flex;gap:6px;align-items:center}
.pill{font-size:9px;padding:3px 8px;border-radius:100px;font-weight:600;letter-spacing:.04em}
.pill-b{background:rgba(59,130,246,.1);color:var(--ac)}
.pill-g{background:rgba(16,185,129,.1);color:var(--gn)}

/* Tabs */
.tabs{display:flex;padding:0 16px;background:var(--bg);border-bottom:1px solid rgba(255,255,255,.04);overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:12px 16px;font-size:13px;font-weight:500;color:var(--mt);cursor:pointer;border-bottom:2px solid transparent;transition:.2s;white-space:nowrap;min-height:44px;display:flex;align-items:center}
.tab:hover{color:var(--tx)}.tab.on{color:var(--ac);border-color:var(--ac)}

.wrap{max-width:1200px;margin:0 auto;padding:16px}
.sec{display:none}.sec.on{display:block}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.st{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:12px}
.st small{font-size:9px;color:var(--dm);text-transform:uppercase;letter-spacing:.14em;display:block;margin-bottom:2px}
.st strong{font-family:Sora;font-size:20px;font-weight:700}
.st strong.b{color:var(--ac)}.st strong.g{color:var(--gn)}.st strong.o{color:var(--og)}

/* Toolbar */
.bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.bar input{flex:1;min-width:140px;padding:10px 14px;background:var(--sf);border:1px solid var(--bd);border-radius:10px;color:var(--tx);font-size:14px;outline:none;transition:.2s;min-height:44px}
.bar input:focus{border-color:var(--ac)}
.fbtn{padding:8px 14px;background:var(--sf);border:1px solid var(--bd);border-radius:10px;color:var(--mt);font-size:12px;cursor:pointer;transition:.15s;min-height:44px}
.fbtn:hover,.fbtn.on{border-color:var(--ac);color:var(--ac)}

/* Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px;transition:.2s;position:relative;overflow:hidden}
.card:hover{border-color:rgba(59,130,246,.2)}
.card .tag{position:absolute;top:0;right:0;font-size:8px;padding:3px 8px;border-radius:0 0 0 8px;text-transform:uppercase;letter-spacing:.08em;font-weight:600}
.tag-p{background:rgba(59,130,246,.08);color:var(--ac)}
.tag-i{background:rgba(249,115,22,.08);color:var(--og)}
.card h4{font-family:Sora;font-weight:600;font-size:13px;margin-bottom:4px;padding-right:50px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card .url{font-size:11px;color:var(--mt);margin-bottom:8px;display:flex;align-items:center;gap:4px;overflow:hidden}
.card .url a{color:var(--ac);text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.card .url a:hover{text-decoration:underline}
.dot{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:500;padding:2px 8px;border-radius:100px}
.dot-g{background:rgba(16,185,129,.08);color:var(--gn)}.dot-r{background:rgba(239,68,68,.08);color:var(--rd)}
.card .acts{display:flex;gap:5px;margin-top:10px;flex-wrap:wrap}
.ab{padding:7px 12px;font-size:11px;border-radius:8px;border:1px solid var(--bd);background:transparent;color:var(--mt);cursor:pointer;transition:.15s;min-height:36px;display:inline-flex;align-items:center;gap:4px}
.ab:hover{border-color:var(--ac);color:var(--ac)}
.ab:active{transform:scale(.96)}
.ab.x:hover{border-color:var(--rd);color:var(--rd)}
.ab.prim{background:var(--ac);border-color:var(--ac);color:#fff}
.ab.prim:hover{background:var(--ach)}

/* Copy button */
.cpb{padding:4px 8px;font-size:10px;border-radius:6px;border:1px solid var(--bd);background:transparent;color:var(--dm);cursor:pointer;transition:.15s;min-height:28px;display:inline-flex;align-items:center;gap:3px;flex-shrink:0}
.cpb:hover{border-color:var(--ac);color:var(--ac)}
.cpb:active{transform:scale(.93)}
.cpb.ok{border-color:var(--gn);color:var(--gn)}

/* Deploy Section */
.dw{max-width:640px}
.dw h2{font-family:Sora;font-size:20px;font-weight:700;margin-bottom:4px}
.dw>p{color:var(--mt);font-size:13px;margin-bottom:20px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:11px;color:var(--dm);text-transform:uppercase;letter-spacing:.1em;font-weight:500;margin-bottom:5px}
.fi{width:100%;padding:12px 14px;background:var(--sf);border:1px solid var(--bd);border-radius:10px;color:var(--tx);font-size:14px;outline:none;transition:.2s;resize:vertical;min-height:44px}
.fi:focus{border-color:var(--ac)}
textarea.fi{min-height:160px;font-family:'SF Mono',Menlo,'Courier New',monospace;font-size:12px;line-height:1.5}

/* Preview link box */
.preview-box{margin:8px 0 16px;padding:12px 14px;background:var(--bg2);border:1px solid var(--bd);border-radius:10px;display:flex;align-items:center;justify-content:space-between;gap:8px;min-height:44px}
.preview-box .link{font-size:13px;color:var(--ac);font-family:Sora;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.preview-box.empty .link{color:var(--dm)}
.char-count{font-size:10px;color:var(--dm);text-align:right;margin-top:4px}

/* Buttons */
.btn{padding:14px 24px;border-radius:100px;font-family:Sora;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:.2s;display:inline-flex;align-items:center;justify-content:center;gap:7px;min-height:48px;width:100%}
.btn-p{background:var(--ac);color:#fff}.btn-p:hover{background:var(--ach);box-shadow:0 4px 16px rgba(59,130,246,.3)}
.btn-s{background:transparent;border:1px solid var(--bd);color:var(--mt);width:auto}.btn-s:hover{border-color:var(--ac);color:var(--ac)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn:active:not(:disabled){transform:scale(.97)}

/* Steps */
.steps{display:flex;gap:6px;margin-bottom:18px;align-items:center}
.step{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--dm);font-weight:500}
.step .n{width:22px;height:22px;border-radius:50%;background:var(--sf);border:1.5px solid var(--bd);display:flex;align-items:center;justify-content:center;font-family:Sora;font-size:10px;font-weight:700;transition:.3s;flex-shrink:0}
.step.done .n{background:var(--gn);border-color:var(--gn);color:#fff}
.step.act .n{background:var(--ac);border-color:var(--ac);color:#fff;box-shadow:0 0 10px rgba(59,130,246,.3)}
.step::after{content:'→';color:var(--bd);margin:0 2px;font-size:10px}
.step:last-child::after{display:none}

/* Log */
.log{margin-top:14px;padding:12px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);font-size:11px;line-height:1.7;max-height:200px;overflow-y:auto;white-space:pre-wrap;font-family:'SF Mono',Menlo,monospace;display:none}
.log .l{color:var(--dm)}.log .ok{color:var(--gn)}.log .er{color:var(--rd)}.log .i{color:var(--ac)}

/* Success card */
.success-card{background:var(--sf);border:1px solid rgba(16,185,129,.2);border-radius:16px;padding:28px 20px;text-align:center;display:none}
.success-card .check{width:56px;height:56px;border-radius:50%;background:rgba(16,185,129,.1);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:28px}
.success-card h3{font-family:Sora;font-size:18px;font-weight:700;margin-bottom:12px}
.success-card .link-box{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:12px;display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:16px}
.success-card .link-box a{color:var(--ac);font-size:14px;font-weight:500;word-break:break-all;text-decoration:none}
.success-card .link-box a:hover{text-decoration:underline}
.success-card .btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}

/* Modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.mo.show{display:flex}
.mo-box{background:var(--sf);border:1px solid var(--bd);border-radius:16px;max-width:380px;width:100%;padding:20px}
.mo-box h3{font-family:Sora;font-size:16px;font-weight:700;margin-bottom:10px}

/* Toast */
.toast{position:fixed;bottom:16px;left:16px;right:16px;max-width:360px;margin:0 auto;padding:12px 16px;border-radius:10px;font-size:12px;font-weight:500;z-index:300;transform:translateY(80px);opacity:0;transition:.3s;text-align:center}
.toast.show{transform:translateY(0);opacity:1}
.toast.ts{background:var(--gn);color:#fff}.toast.te{background:var(--rd);color:#fff}.toast.ti{background:var(--ac);color:#fff}

@keyframes spin{to{transform:rotate(360deg)}}
.sp{width:16px;height:16px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .5s linear infinite;display:inline-block}

/* File input styled */
.file-label{display:flex;align-items:center;justify-content:center;padding:12px;border:2px dashed var(--bd);border-radius:10px;color:var(--dm);font-size:12px;cursor:pointer;transition:.2s;min-height:48px;text-align:center}
.file-label:hover{border-color:var(--ac);color:var(--ac)}
.file-label.has{border-color:var(--gn);color:var(--gn);border-style:solid}
#dFile{display:none}

/* Mobile */
@media(max-width:640px){
  .wrap{padding:12px}
  .stats{grid-template-columns:repeat(2,1fr);gap:6px}
  .grid{grid-template-columns:1fr}
  .tab{padding:10px 12px;font-size:12px}
  header{padding:0 12px;height:48px}
  .dw h2{font-size:18px}
  .steps{flex-wrap:wrap;gap:4px}
  .btn{padding:12px 20px;font-size:12px}
  textarea.fi{min-height:120px;font-size:11px}
  .success-card{padding:20px 16px}
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 36 36" fill="none"><circle cx="18" cy="18" r="16.5" stroke="rgba(59,130,246,.18)" stroke-width="1"/><path d="M18 8L25.5 19" stroke="#3B82F6" stroke-width="2.2" stroke-linecap="round"/><path d="M18 8L10.5 19" stroke="#3B82F6" stroke-width="2.2" stroke-linecap="round"/><path d="M18 14L22.5 21.5" stroke="rgba(59,130,246,.3)" stroke-width="1.4" stroke-linecap="round"/><path d="M18 14L13.5 21.5" stroke="rgba(59,130,246,.3)" stroke-width="1.4" stroke-linecap="round"/><line x1="11" y1="26" x2="25" y2="26" stroke="rgba(59,130,246,.15)" stroke-width="1" stroke-linecap="round"/></svg>
    ELE<b>V</b>O
  </div>
  <div class="hdr-r">
    <div class="pill pill-b" id="cfgPill">...</div>
    <div class="pill pill-g" id="cntPill">0</div>
  </div>
</header>

<div class="tabs">
  <div class="tab on" data-t="dep">Deploy</div>
  <div class="tab" data-t="dash">Apps</div>
</div>

<div class="wrap">

<!-- ═══ DEPLOY ═══ -->
<div class="sec on" id="dep">
  <div class="dw">
    <h2>Website deployen</h2>
    <p>In Claude bauen → HTML kopieren → hier pasten → live.</p>

    <div class="steps">
      <div class="step act" id="s1"><span class="n">1</span>Eingabe</div>
      <div class="step" id="s2"><span class="n">2</span>GitHub</div>
      <div class="step" id="s3"><span class="n">3</span>Coolify</div>
      <div class="step" id="s4"><span class="n">4</span>Live</div>
    </div>

    <div id="depForm">
      <div class="fg">
        <label>Firmenname</label>
        <input type="text" class="fi" id="dName" placeholder="z.B. Mueller Sanitaer" autocomplete="off" autocapitalize="words">
      </div>

      <div class="preview-box empty" id="previewBox">
        <span class="link" id="previewLink">Subdomain erscheint hier...</span>
        <button class="cpb" onclick="copyText(document.getElementById('previewLink').textContent)" id="previewCopy" style="display:none">Kopieren</button>
      </div>

      <div class="fg">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
          <label style="margin:0">HTML-Code</label>
          <div style="display:flex;gap:5px">
            <button class="cpb" onclick="pasteCode()" style="font-size:11px;padding:5px 10px">📋 Einfügen</button>
            <button class="cpb" onclick="document.getElementById('dHtml').select()" style="font-size:11px;padding:5px 10px">Alles</button>
            <button class="cpb" onclick="document.getElementById('dHtml').value='';document.getElementById('dHtml').dispatchEvent(new Event('input'))" style="font-size:11px;padding:5px 10px">✕</button>
          </div>
        </div>
        <textarea class="fi" id="dHtml" placeholder="<!DOCTYPE html>..."></textarea>
        <div class="char-count" id="charCount">0 Zeichen</div>
      </div>

      <div class="fg">
        <label for="dFile" class="file-label" id="fileLabel">
          HTML-Datei wählen oder hierhin ziehen
        </label>
        <input type="file" accept=".html,.htm" id="dFile">
      </div>

      <button class="btn btn-p" id="depBtn" onclick="deploy()">
        Deploy starten
      </button>
    </div>

    <!-- Success -->
    <div class="success-card" id="depDone">
      <div class="check">✓</div>
      <h3 id="doneTitle">Live!</h3>
      <div class="link-box">
        <a id="doneLink" href="#" target="_blank"></a>
        <button class="cpb" onclick="copyText(document.getElementById('doneLink').textContent)">Kopieren</button>
      </div>
      <div class="btns">
        <button class="ab prim" onclick="window.open(document.getElementById('doneLink').href,'_blank')">Öffnen</button>
        <button class="ab" onclick="resetDep()">Nächste Website</button>
        <button class="ab" onclick="sw('dash');loadApps()">Apps</button>
      </div>
    </div>

    <div class="log" id="log"></div>
  </div>
</div>

<!-- ═══ DASHBOARD ═══ -->
<div class="sec" id="dash">
  <div class="stats">
    <div class="st"><small>Previews</small><strong class="b" id="nPrev">-</strong></div>
    <div class="st"><small>Infra</small><strong class="o" id="nInfra">-</strong></div>
    <div class="st"><small>Running</small><strong class="g" id="nRun">-</strong></div>
    <div class="st"><small>Total</small><strong id="nTotal">-</strong></div>
  </div>
  <div class="bar">
    <input type="text" id="q" placeholder="Suchen..." autocomplete="off">
    <button class="fbtn on" data-f="all">Alle</button>
    <button class="fbtn" data-f="preview">Previews</button>
    <button class="fbtn" data-f="infra">Infra</button>
    <button class="fbtn" onclick="loadApps()" title="Refresh">↻</button>
  </div>
  <div class="grid" id="g"></div>
</div>

</div>

<!-- Modal -->
<div class="mo" id="cMo">
  <div class="mo-box">
    <h3>Löschen?</h3>
    <p id="cP" style="color:var(--mt);margin-bottom:14px;font-size:13px"></p>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="ab" onclick="cMo()" style="min-height:40px">Abbrechen</button>
      <button class="ab" id="cBtn" style="min-height:40px;border-color:var(--rd);color:var(--rd)">Löschen</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let apps=[],filt='all';

// ═══ COPY HELPER ═══
function copyText(text){
  if(!text||text.includes('erscheint'))return;
  navigator.clipboard.writeText(text).then(()=>toast('Kopiert!','ts')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;left:-9999px';
    document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('Kopiert!','ts');
  });
}

// ═══ PASTE HELPER ═══
async function pasteCode(){
  try{
    const text=await navigator.clipboard.readText();
    if(text){
      document.getElementById('dHtml').value=text;
      document.getElementById('dHtml').dispatchEvent(new Event('input'));
      toast('Eingefügt! '+text.length.toLocaleString('de')+' Zeichen','ts');
    }
  }catch(e){
    toast('Clipboard-Zugriff verweigert — manuell einfügen (lange drücken)','te');
  }
}

// ═══ SLUG ═══
function toSlug(n){return n.toLowerCase().replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue').replace(/ß/g,'ss').replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'')}

// ═══ Tabs ═══
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>sw(t.dataset.t));
function sw(id){document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.t===id));document.querySelectorAll('.sec').forEach(s=>s.classList.toggle('on',s.id===id))}

// ═══ Toast ═══
function toast(m,t='ti'){const e=document.getElementById('toast');e.textContent=m;e.className=`toast ${t} show`;setTimeout(()=>e.classList.remove('show'),2500)}

// ═══ Live Preview Link ═══
document.getElementById('dName').addEventListener('input',function(){
  const v=this.value.trim();
  const box=document.getElementById('previewBox');
  const link=document.getElementById('previewLink');
  const cp=document.getElementById('previewCopy');
  if(v.length>0){
    const slug=toSlug(v);
    link.textContent=slug+'-preview.elevo.solutions';
    box.classList.remove('empty');
    cp.style.display='inline-flex';
  }else{
    link.textContent='Subdomain erscheint hier...';
    box.classList.add('empty');
    cp.style.display='none';
  }
});

// ═══ Char Counter ═══
document.getElementById('dHtml').addEventListener('input',function(){
  const c=this.value.length;
  const lines=this.value.split('\n').length;
  document.getElementById('charCount').textContent=c.toLocaleString('de')+' Zeichen · '+lines+' Zeilen';
});

// ═══ File Upload ═══
const fileInput=document.getElementById('dFile');
const fileLabel=document.getElementById('fileLabel');
fileInput.addEventListener('change',function(){
  const f=this.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    document.getElementById('dHtml').value=e.target.result;
    document.getElementById('dHtml').dispatchEvent(new Event('input'));
    fileLabel.textContent='✓ '+f.name;
    fileLabel.classList.add('has');
    if(!document.getElementById('dName').value){
      document.getElementById('dName').value=f.name.replace(/\.html?$/i,'').replace(/[-_]/g,' ');
      document.getElementById('dName').dispatchEvent(new Event('input'));
    }
  };
  r.readAsText(f);
});

// Drag & Drop
fileLabel.addEventListener('dragover',e=>{e.preventDefault();fileLabel.style.borderColor='var(--ac)'});
fileLabel.addEventListener('dragleave',()=>{fileLabel.style.borderColor=''});
fileLabel.addEventListener('drop',e=>{
  e.preventDefault();fileLabel.style.borderColor='';
  if(e.dataTransfer.files.length){fileInput.files=e.dataTransfer.files;fileInput.dispatchEvent(new Event('change'))}
});

// ═══ Filter ═══
document.querySelectorAll('.fbtn[data-f]').forEach(b=>b.onclick=()=>{filt=b.dataset.f;document.querySelectorAll('.fbtn[data-f]').forEach(x=>x.classList.toggle('on',x===b));render()});
document.getElementById('q').oninput=render;

// ═══ Apps ═══
const INFRA=[1,2,4,5,7];
async function loadApps(){
  try{const r=await fetch('/api/apps');const d=await r.json();apps=d.apps||[];render();document.getElementById('cntPill').textContent=apps.length}catch(e){toast('Laden fehlgeschlagen','te')}
}

function render(){
  const q=document.getElementById('q').value.toLowerCase();
  let f=apps.filter(a=>{
    const inf=INFRA.includes(a.environment_id);
    if(filt==='preview'&&inf)return false;if(filt==='infra'&&!inf)return false;
    if(q&&!a.name.toLowerCase().includes(q)&&!(a.fqdn||'').toLowerCase().includes(q))return false;
    return true;
  }).sort((a,b)=>{if(a.environment_id===3&&b.environment_id!==3)return -1;if(a.environment_id!==3&&b.environment_id===3)return 1;return a.name.localeCompare(b.name)});

  const pv=apps.filter(a=>a.environment_id===3).length;
  const inf=apps.filter(a=>INFRA.includes(a.environment_id)).length;
  const run=apps.filter(a=>(a.status||'').includes('running')).length;
  document.getElementById('nPrev').textContent=pv;
  document.getElementById('nInfra').textContent=inf;
  document.getElementById('nRun').textContent=run;
  document.getElementById('nTotal').textContent=apps.length;

  document.getElementById('g').innerHTML=f.map(a=>{
    const isInf=INFRA.includes(a.environment_id);
    const dom=(a.fqdn||'').replace(/^https?:\/\//,'').replace(/\/$/,'');
    const up=(a.status||'').includes('running');
    return`<div class="card">
      <div class="tag ${isInf?'tag-i':'tag-p'}">${isInf?'Infra':'Preview'}</div>
      <h4>${h(a.name)}</h4>
      <div class="url"><a href="${a.fqdn}" target="_blank">${dom}</a><button class="cpb" onclick="event.stopPropagation();copyText('${dom}')">📋</button></div>
      <span class="dot ${up?'dot-g':'dot-r'}">${up?'● Live':'○ Off'}</span>
      <div class="acts">
        <button class="ab prim" onclick="window.open('${a.fqdn}','_blank')">Öffnen</button>
        <button class="ab" onclick="rd('${a.uuid}','${h(a.name)}')">Redeploy</button>
        ${!isInf?`<button class="ab x" onclick="cd('${a.uuid}','${h(a.name)}')">✕</button>`:''}
      </div>
    </div>`
  }).join('')||'<p style="color:var(--dm);text-align:center;padding:40px">Keine Apps gefunden</p>';
}
function h(s){return(s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;').replace(/</g,'&lt;')}

async function rd(u,n){toast(n+' wird redeployed...','ti');try{await fetch('/api/deploy/'+u);toast(n+' Redeploy gestartet','ts')}catch(e){toast('Fehler','te')}}
function cd(u,n){document.getElementById('cP').textContent=`"${n}" wirklich löschen?`;document.getElementById('cBtn').onclick=()=>da(u,n);document.getElementById('cMo').classList.add('show')}
function cMo(){document.getElementById('cMo').classList.remove('show')}
async function da(u,n){cMo();toast('Lösche...','ti');try{await fetch('/api/app/'+u,{method:'DELETE'});toast(n+' gelöscht','ts');setTimeout(loadApps,1000)}catch(e){toast('Fehler','te')}}

// ═══ Deploy ═══
function setS(n){[1,2,3,4].forEach(i=>{const e=document.getElementById('s'+i);e.classList.remove('act','done');if(i<n)e.classList.add('done');if(i===n)e.classList.add('act')})}
function lg(m,c='l'){const e=document.getElementById('log');e.style.display='block';e.innerHTML+=`<span class="${c}">${m}</span>\n`;e.scrollTop=e.scrollHeight}

async function deploy(){
  const name=document.getElementById('dName').value.trim();
  const html=document.getElementById('dHtml').value.trim();
  if(!name)return toast('Firmenname eingeben','te');
  if(!html)return toast('HTML-Code eingeben','te');
  if(html.length<100)return toast('HTML zu kurz — mindestens 100 Zeichen','te');

  const btn=document.getElementById('depBtn');
  btn.disabled=true;btn.innerHTML='<span class="sp"></span> Deploying...';
  document.getElementById('log').innerHTML='';
  document.getElementById('log').style.display='block';
  setS(2);

  const slug=toSlug(name);
  lg('▸ Deploy: '+name+' → '+slug+'-preview.elevo.solutions','i');
  lg('▸ HTML: '+html.length.toLocaleString('de')+' Zeichen','l');

  try{
    const r=await fetch('/api/deploy-full',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,html})});
    const d=await r.json();

    if(d.success){
      setS(3);lg('✓ GitHub: OK','ok');
      lg('✓ Coolify: '+(d.action==='created'?'Erstellt':'Aktualisiert'),'ok');
      setS(4);lg('✓ Live: '+d.domain,'ok');

      const domain=d.domain||'https://'+slug+'-preview.elevo.solutions';
      setTimeout(()=>{
        document.getElementById('depForm').style.display='none';
        const sc=document.getElementById('depDone');sc.style.display='block';
        document.getElementById('doneTitle').textContent=name+' ist live!';
        const lnk=document.getElementById('doneLink');
        lnk.href=domain;lnk.textContent=domain.replace('https://','');
        toast('Deploy erfolgreich!','ts');
      },400);
    }else{
      lg('✗ '+(d.error||JSON.stringify(d)),'er');
      if(d.status)lg('HTTP Status: '+d.status,'er');
      lg('','l');
      lg('<button onclick="deploy()" style="padding:8px 16px;background:var(--ac);color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:Sora;font-size:12px;margin-top:4px">↻ Nochmal versuchen</button>','l');
      setS(1);
      toast('Deploy fehlgeschlagen','te');
    }
  }catch(e){lg('✗ Netzwerk-Fehler: '+e.message,'er');toast('Fehler','te')}

  btn.disabled=false;btn.innerHTML='Deploy starten';
}

function resetDep(){
  document.getElementById('depForm').style.display='block';
  document.getElementById('depDone').style.display='none';
  document.getElementById('log').style.display='none';
  document.getElementById('log').innerHTML='';
  document.getElementById('dName').value='';
  document.getElementById('dHtml').value='';
  document.getElementById('charCount').textContent='0 Zeichen';
  document.getElementById('previewLink').textContent='Subdomain erscheint hier...';
  document.getElementById('previewBox').classList.add('empty');
  document.getElementById('previewCopy').style.display='none';
  document.getElementById('fileLabel').textContent='HTML-Datei wählen oder hierhin ziehen';
  document.getElementById('fileLabel').classList.remove('has');
  document.getElementById('dFile').value='';
  setS(1);
}

// ═══ Init ═══
async function init(){
  try{const r=await fetch('/api/config');const d=await r.json();const p=document.getElementById('cfgPill');const ok=d.coolify&&d.github;p.textContent=ok?'Ready':'Config!';p.className='pill '+(ok?'pill-g':'pill-b')}catch(e){}
  loadApps();setS(1);
}
init();
</script>
</body>
</html>
