<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELEVO Deploy Center</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#05070E;--bg2:#0A0E1A;--surface:#111827;--surface-h:#1A2035;--border:#1E2A42;--text:#E2E8F0;--muted:#8899B0;--dim:#516179;--accent:#3B82F6;--accent-h:#2563EB;--green:#10B981;--orange:#F59E0B;--red:#EF4444;--radius:14px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:Outfit,sans-serif;font-weight:300;min-height:100vh}
::selection{background:var(--accent);color:#fff}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* Header */
header{position:sticky;top:0;z-index:100;background:rgba(5,7,14,.85);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.04);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:Sora;font-weight:700;font-size:18px;letter-spacing:.24em;display:flex;align-items:center;gap:10px}
.logo span{color:var(--accent)}
.logo-icon{width:28px;height:28px}
.header-actions{display:flex;gap:10px;align-items:center}
.badge{font-size:11px;padding:4px 10px;border-radius:100px;background:rgba(59,130,246,.12);color:var(--accent);font-weight:500}
.badge.green{background:rgba(16,185,129,.12);color:var(--green)}

/* Tabs */
.tabs{display:flex;gap:0;padding:0 24px;background:var(--bg);border-bottom:1px solid rgba(255,255,255,.04)}
.tab{padding:14px 20px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-color:var(--accent)}

/* Content */
.content{max-width:1200px;margin:0 auto;padding:24px}
.section{display:none}.section.active{display:block}

/* Stats bar */
.stats{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;flex:1;min-width:140px}
.stat-label{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px}
.stat-value{font-family:Sora;font-size:24px;font-weight:700}
.stat-value.blue{color:var(--accent)}.stat-value.green{color:var(--green)}.stat-value.orange{color:var(--orange)}

/* Search + Filter */
.toolbar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.search{flex:1;min-width:200px;padding:10px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:Outfit;font-size:14px;outline:none;transition:border .2s}
.search:focus{border-color:var(--accent)}
.filter-btn{padding:10px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--muted);font-size:13px;cursor:pointer;transition:all .2s;font-family:Outfit}
.filter-btn:hover,.filter-btn.active{border-color:var(--accent);color:var(--accent)}

/* App Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.app-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;transition:all .25s;cursor:default;position:relative;overflow:hidden}
.app-card:hover{border-color:rgba(59,130,246,.25);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.3)}
.app-card .type{position:absolute;top:0;right:0;font-size:9px;padding:4px 10px;border-radius:0 0 0 10px;background:rgba(59,130,246,.1);color:var(--accent);text-transform:uppercase;letter-spacing:.1em;font-weight:600}
.app-card .type.infra{background:rgba(249,115,22,.1);color:var(--orange)}
.app-name{font-family:Sora;font-weight:600;font-size:14px;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:60px}
.app-domain{font-size:12px;color:var(--muted);margin-bottom:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.app-domain a{color:var(--accent);text-decoration:none}
.app-domain a:hover{text-decoration:underline}
.app-status{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:3px 10px;border-radius:100px}
.app-status.running{background:rgba(16,185,129,.1);color:var(--green)}
.app-status.stopped{background:rgba(239,68,68,.1);color:var(--red)}
.app-actions{display:flex;gap:6px;margin-top:12px}
.app-btn{padding:6px 12px;font-size:11px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:Outfit;transition:all .15s}
.app-btn:hover{border-color:var(--accent);color:var(--accent)}
.app-btn.danger:hover{border-color:var(--red);color:var(--red)}
.app-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.app-btn.primary:hover{background:var(--accent-h)}

/* Builder Section */
.builder{max-width:700px}
.builder h2{font-family:Sora;font-size:22px;font-weight:700;margin-bottom:6px}
.builder p{color:var(--muted);font-size:14px;margin-bottom:28px}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;font-weight:500;margin-bottom:6px}
.form-input{width:100%;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:Outfit;font-size:14px;outline:none;transition:border .2s;resize:vertical}
.form-input:focus{border-color:var(--accent)}
textarea.form-input{min-height:100px}
.btn{padding:14px 28px;border-radius:100px;font-family:Sora;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-h);transform:translateY(-1px);box-shadow:0 4px 20px rgba(59,130,246,.3)}
.btn-secondary{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* Progress Steps */
.progress{margin:28px 0;display:flex;gap:0}
.step{flex:1;text-align:center;position:relative;padding-bottom:24px}
.step::after{content:'';position:absolute;bottom:10px;left:50%;width:100%;height:2px;background:var(--border)}
.step:last-child::after{display:none}
.step-dot{width:20px;height:20px;border-radius:50%;background:var(--surface);border:2px solid var(--border);margin:0 auto 8px;position:relative;z-index:1;transition:all .3s}
.step.done .step-dot{background:var(--green);border-color:var(--green)}
.step.active .step-dot{background:var(--accent);border-color:var(--accent);box-shadow:0 0 12px rgba(59,130,246,.4)}
.step-label{font-size:11px;color:var(--dim);font-weight:500}
.step.done .step-label{color:var(--green)}
.step.active .step-label{color:var(--accent)}

/* Output */
.output{margin-top:20px;padding:16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);font-size:13px;line-height:1.7;max-height:300px;overflow-y:auto;white-space:pre-wrap;font-family:'Courier New',monospace}
.output .log{color:var(--dim)}.output .ok{color:var(--green)}.output .err{color:var(--red)}.output .info{color:var(--accent)}

/* Preview */
.preview-frame{width:100%;height:500px;border:1px solid var(--border);border-radius:var(--radius);background:#fff;margin:16px 0}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;max-width:500px;width:100%;padding:28px}
.modal h3{font-family:Sora;font-size:18px;font-weight:700;margin-bottom:16px}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;padding:14px 20px;border-radius:12px;font-size:13px;font-weight:500;z-index:300;transform:translateY(100px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{background:var(--green);color:#fff}
.toast.error{background:var(--red);color:#fff}
.toast.info{background:var(--accent);color:#fff}

/* Spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
.spinner.dark{border-color:var(--border);border-top-color:var(--accent)}

/* Mobile */
@media(max-width:600px){
  .content{padding:16px}
  .stats{gap:10px}.stat{min-width:100px;padding:12px 14px}
  .grid{grid-template-columns:1fr}
  .tabs{overflow-x:auto;gap:0}.tab{padding:12px 14px;font-size:12px;white-space:nowrap}
  .builder{max-width:100%}
  header{padding:0 16px}
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg class="logo-icon" viewBox="0 0 36 36" fill="none"><circle cx="18" cy="18" r="16.5" stroke="rgba(59,130,246,.18)" stroke-width="1"/><path d="M18 8L25.5 19" stroke="#3B82F6" stroke-width="2.2" stroke-linecap="round"/><path d="M18 8L10.5 19" stroke="#3B82F6" stroke-width="2.2" stroke-linecap="round"/><path d="M18 14L22.5 21.5" stroke="rgba(59,130,246,.3)" stroke-width="1.4" stroke-linecap="round"/><path d="M18 14L13.5 21.5" stroke="rgba(59,130,246,.3)" stroke-width="1.4" stroke-linecap="round"/><line x1="11" y1="26" x2="25" y2="26" stroke="rgba(59,130,246,.15)" stroke-width="1" stroke-linecap="round"/></svg>
    ELE<span>V</span>O
  </div>
  <div class="header-actions">
    <div class="badge" id="configBadge">...</div>
    <div class="badge green" id="appCount">0 Apps</div>
  </div>
</header>

<div class="tabs">
  <div class="tab active" data-tab="dashboard">Dashboard</div>
  <div class="tab" data-tab="builder">Website bauen</div>
  <div class="tab" data-tab="deploy">Quick Deploy</div>
</div>

<!-- ═══ DASHBOARD ═══ -->
<div class="content">
<div class="section active" id="dashboard">
  <div class="stats">
    <div class="stat"><div class="stat-label">Previews</div><div class="stat-value blue" id="previewCount">-</div></div>
    <div class="stat"><div class="stat-label">Infra</div><div class="stat-value orange" id="infraCount">-</div></div>
    <div class="stat"><div class="stat-label">Running</div><div class="stat-value green" id="runningCount">-</div></div>
  </div>
  <div class="toolbar">
    <input type="text" class="search" id="searchInput" placeholder="Suchen...">
    <button class="filter-btn active" data-filter="all">Alle</button>
    <button class="filter-btn" data-filter="preview">Previews</button>
    <button class="filter-btn" data-filter="infra">Infra</button>
    <button class="filter-btn" onclick="loadApps()">↻</button>
  </div>
  <div class="grid" id="appGrid"></div>
</div>

<!-- ═══ BUILDER ═══ -->
<div class="section" id="builder">
  <div class="builder">
    <h2>Website bauen</h2>
    <p>URL eingeben → Claude baut die Website → One-Click Deploy</p>

    <div class="progress">
      <div class="step" id="step1"><div class="step-dot"></div><div class="step-label">Eingabe</div></div>
      <div class="step" id="step2"><div class="step-dot"></div><div class="step-label">Claude baut</div></div>
      <div class="step" id="step3"><div class="step-dot"></div><div class="step-label">Preview</div></div>
      <div class="step" id="step4"><div class="step-dot"></div><div class="step-label">Deploy</div></div>
    </div>

    <!-- Step 1: Input -->
    <div id="builderInput">
      <div class="form-group">
        <label>Website-URL des Prospects</label>
        <input type="text" class="form-input" id="buildUrl" placeholder="https://beispiel.de">
      </div>
      <div class="form-group">
        <label>Firmenname (für Subdomain)</label>
        <input type="text" class="form-input" id="buildName" placeholder="Beispiel GmbH">
      </div>
      <div class="form-group">
        <label>Zusätzliche Anweisungen (optional)</label>
        <textarea class="form-input" id="buildPrompt" placeholder="z.B. Branche: GaLaBau, helles Theme, Signature Feature: Preisrechner..."></textarea>
      </div>
      <button class="btn btn-primary" id="buildBtn" onclick="startBuild()">
        Website generieren
      </button>
    </div>

    <!-- Step 2: Building -->
    <div id="builderProgress" style="display:none">
      <div class="output" id="buildLog"></div>
    </div>

    <!-- Step 3: Preview -->
    <div id="builderPreview" style="display:none">
      <div style="display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="deployBuilt()">Jetzt deployen</button>
        <button class="btn btn-secondary" onclick="downloadHtml()">HTML downloaden</button>
        <button class="btn btn-secondary" onclick="resetBuilder()">Neu starten</button>
      </div>
      <iframe id="previewFrame" class="preview-frame" sandbox="allow-scripts"></iframe>
    </div>

    <!-- Step 4: Deployed -->
    <div id="builderDone" style="display:none">
      <div style="text-align:center;padding:40px 0">
        <div style="font-size:48px;margin-bottom:16px">✓</div>
        <h3 style="font-family:Sora;font-size:20px;margin-bottom:8px" id="deployedTitle">Deployed!</h3>
        <a id="deployedLink" href="#" target="_blank" style="color:var(--accent);font-size:16px"></a>
        <div style="margin-top:24px;display:flex;gap:10px;justify-content:center">
          <button class="btn btn-primary" onclick="resetBuilder()">Nächste Website</button>
          <button class="btn btn-secondary" onclick="switchTab('dashboard');loadApps()">Dashboard</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ═══ QUICK DEPLOY ═══ -->
<div class="section" id="deploy">
  <div class="builder">
    <h2>Quick Deploy</h2>
    <p>Eigene HTML-Datei hochladen und sofort deployen</p>
    <div class="form-group">
      <label>Firmenname</label>
      <input type="text" class="form-input" id="quickName" placeholder="Beispiel GmbH">
    </div>
    <div class="form-group">
      <label>HTML-Code</label>
      <textarea class="form-input" id="quickHtml" placeholder="<!DOCTYPE html>..." style="min-height:200px;font-family:monospace;font-size:12px"></textarea>
    </div>
    <div class="form-group">
      <label>Oder HTML-Datei wählen</label>
      <input type="file" accept=".html,.htm" id="htmlFile" style="color:var(--muted);font-size:13px" onchange="loadFile(this)">
    </div>
    <button class="btn btn-primary" onclick="quickDeploy()">Deploy starten</button>
    <div class="output" id="quickLog" style="display:none;margin-top:16px"></div>
  </div>
</div>
</div>

<!-- Confirm Modal -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal">
    <h3 id="confirmTitle">Bestätigen</h3>
    <p id="confirmText" style="color:var(--muted);margin-bottom:20px"></p>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-secondary" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-primary" id="confirmBtn" style="background:var(--red)">Löschen</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ═══ State ═══
let apps = [];
let builtHtml = '';
let builtName = '';
let currentFilter = 'all';

// ═══ Tabs ═══
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));
function switchTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === id));
  document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id === id));
}

// ═══ Toast ═══
function toast(msg, type='info') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ═══ Apps ═══
async function loadApps() {
  try {
    const r = await fetch('/api/apps'); const d = await r.json();
    apps = d.apps || [];
    renderApps();
    document.getElementById('appCount').textContent = `${apps.length} Apps`;
  } catch(e) { toast('Apps laden fehlgeschlagen', 'error'); }
}

function renderApps() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const grid = document.getElementById('appGrid');
  
  const INFRA_ENV = [1, 2, 4, 5, 7]; // non-preview environments
  
  let filtered = apps.filter(a => {
    const isInfra = INFRA_ENV.includes(a.environment_id);
    if (currentFilter === 'preview' && isInfra) return false;
    if (currentFilter === 'infra' && !isInfra) return false;
    if (q && !a.name.toLowerCase().includes(q) && !(a.fqdn||'').toLowerCase().includes(q)) return false;
    return true;
  });

  // Sort: previews first (env 3), then by name
  filtered.sort((a, b) => {
    if (a.environment_id === 3 && b.environment_id !== 3) return -1;
    if (a.environment_id !== 3 && b.environment_id === 3) return 1;
    return a.name.localeCompare(b.name);
  });

  const previews = apps.filter(a => a.environment_id === 3);
  const infra = apps.filter(a => INFRA_ENV.includes(a.environment_id));
  const running = apps.filter(a => (a.status||'').includes('running'));
  
  document.getElementById('previewCount').textContent = previews.length;
  document.getElementById('infraCount').textContent = infra.length;
  document.getElementById('runningCount').textContent = running.length;

  grid.innerHTML = filtered.map(a => {
    const isInfra = INFRA_ENV.includes(a.environment_id);
    const domain = (a.fqdn||'').replace(/^https?:\/\//,'').replace(/\/$/,'');
    const isRunning = (a.status||'').includes('running');
    return `<div class="app-card">
      <div class="type${isInfra?' infra':''}">${isInfra?'Infra':'Preview'}</div>
      <div class="app-name">${esc(a.name)}</div>
      <div class="app-domain"><a href="${a.fqdn}" target="_blank">${domain}</a></div>
      <span class="app-status ${isRunning?'running':'stopped'}">${isRunning?'● Running':'○ Stopped'}</span>
      <div class="app-actions">
        <button class="app-btn" onclick="window.open('${a.fqdn}','_blank')">Öffnen</button>
        <button class="app-btn" onclick="redeploy('${a.uuid}','${esc(a.name)}')">Redeploy</button>
        ${!isInfra?`<button class="app-btn danger" onclick="confirmDelete('${a.uuid}','${esc(a.name)}')">×</button>`:''}
      </div>
    </div>`;
  }).join('');
}

function esc(s) { return (s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

// Filter
document.querySelectorAll('.filter-btn[data-filter]').forEach(b => b.addEventListener('click', () => {
  currentFilter = b.dataset.filter;
  document.querySelectorAll('.filter-btn[data-filter]').forEach(x => x.classList.toggle('active', x === b));
  renderApps();
}));
document.getElementById('searchInput').addEventListener('input', renderApps);

// Redeploy
async function redeploy(uuid, name) {
  toast(`Redeploy: ${name}...`, 'info');
  try {
    await fetch(`/api/deploy/${uuid}`);
    toast(`${name} wird neu deployed`, 'success');
  } catch(e) { toast('Redeploy fehlgeschlagen', 'error'); }
}

// Delete
function confirmDelete(uuid, name) {
  document.getElementById('confirmTitle').textContent = 'App löschen';
  document.getElementById('confirmText').textContent = `"${name}" wirklich löschen? Das kann nicht rückgängig gemacht werden.`;
  document.getElementById('confirmBtn').onclick = () => deleteApp(uuid, name);
  document.getElementById('confirmModal').classList.add('show');
}
function closeModal() { document.getElementById('confirmModal').classList.remove('show'); }
async function deleteApp(uuid, name) {
  closeModal();
  toast(`Lösche ${name}...`, 'info');
  try {
    await fetch(`/api/app/${uuid}`, { method: 'DELETE' });
    toast(`${name} gelöscht`, 'success');
    setTimeout(loadApps, 1000);
  } catch(e) { toast('Löschen fehlgeschlagen', 'error'); }
}

// ═══ Builder ═══
function setStep(n) {
  [1,2,3,4].forEach(i => {
    const el = document.getElementById(`step${i}`);
    el.classList.remove('active','done');
    if (i < n) el.classList.add('done');
    if (i === n) el.classList.add('active');
  });
}

function log(target, msg, cls='log') {
  const el = document.getElementById(target);
  el.innerHTML += `<span class="${cls}">${msg}</span>\n`;
  el.scrollTop = el.scrollHeight;
}

async function startBuild() {
  const url = document.getElementById('buildUrl').value.trim();
  const name = document.getElementById('buildName').value.trim();
  const prompt = document.getElementById('buildPrompt').value.trim();
  
  if (!url && !prompt) return toast('URL oder Anweisungen eingeben', 'error');
  if (!name) return toast('Firmenname eingeben', 'error');

  builtName = name;
  builtHtml = '';
  
  // Show progress
  document.getElementById('builderInput').style.display = 'none';
  document.getElementById('builderProgress').style.display = 'block';
  document.getElementById('buildLog').innerHTML = '';
  setStep(2);

  log('buildLog', `▸ Website wird generiert für: ${url || 'Custom'}`, 'info');
  log('buildLog', `▸ Claude API wird aufgerufen...`, 'log');
  log('buildLog', `▸ Das kann 30-60 Sekunden dauern.`, 'log');

  const btn = document.getElementById('buildBtn');
  btn.disabled = true;

  try {
    const r = await fetch('/api/build', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, prompt: `Firmenname: ${name}\n${prompt}` })
    });
    const d = await r.json();

    if (d.success && d.html) {
      builtHtml = d.html;
      log('buildLog', `✓ Website generiert! (${d.usage?.input_tokens || '?'} input / ${d.usage?.output_tokens || '?'} output tokens)`, 'ok');
      
      // Show preview
      setTimeout(() => {
        document.getElementById('builderProgress').style.display = 'none';
        document.getElementById('builderPreview').style.display = 'block';
        setStep(3);
        
        const frame = document.getElementById('previewFrame');
        frame.srcdoc = builtHtml;
      }, 500);
    } else {
      log('buildLog', `✗ Fehler: ${d.error || JSON.stringify(d.details || d)}`, 'err');
      toast('Build fehlgeschlagen', 'error');
    }
  } catch(e) {
    log('buildLog', `✗ Fehler: ${e.message}`, 'err');
    toast('Build fehlgeschlagen', 'error');
  }
  btn.disabled = false;
}

async function deployBuilt() {
  if (!builtHtml || !builtName) return toast('Nichts zum Deployen', 'error');
  
  setStep(4);
  document.getElementById('builderPreview').style.display = 'none';
  document.getElementById('builderProgress').style.display = 'block';

  log('buildLog', `\n▸ Deploy wird gestartet...`, 'info');
  log('buildLog', `▸ GitHub Repo erstellen...`, 'log');

  try {
    const r = await fetch('/api/deploy-full', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: builtName, html: builtHtml })
    });
    const d = await r.json();

    if (d.success) {
      log('buildLog', `✓ ${d.action === 'created' ? 'Neue App erstellt' : 'App aktualisiert'}`, 'ok');
      log('buildLog', `✓ Domain: ${d.domain}`, 'ok');
      log('buildLog', `✓ UUID: ${d.uuid}`, 'ok');
      
      setTimeout(() => {
        document.getElementById('builderProgress').style.display = 'none';
        document.getElementById('builderDone').style.display = 'block';
        document.getElementById('deployedTitle').textContent = `${builtName} ist live!`;
        const link = document.getElementById('deployedLink');
        link.href = d.domain; link.textContent = d.domain.replace('https://','');
        setStep(4);
        toast('Deploy erfolgreich!', 'success');
      }, 500);
    } else {
      log('buildLog', `✗ Deploy fehlgeschlagen: ${d.error || JSON.stringify(d)}`, 'err');
      toast('Deploy fehlgeschlagen', 'error');
    }
  } catch(e) {
    log('buildLog', `✗ ${e.message}`, 'err');
    toast('Deploy fehlgeschlagen', 'error');
  }
}

function downloadHtml() {
  if (!builtHtml) return;
  const blob = new Blob([builtHtml], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${builtName ? builtName.toLowerCase().replace(/\s+/g,'-') : 'website'}.html`;
  a.click();
}

function resetBuilder() {
  builtHtml = ''; builtName = '';
  document.getElementById('builderInput').style.display = 'block';
  document.getElementById('builderProgress').style.display = 'none';
  document.getElementById('builderPreview').style.display = 'none';
  document.getElementById('builderDone').style.display = 'none';
  document.getElementById('buildLog').innerHTML = '';
  document.getElementById('buildUrl').value = '';
  document.getElementById('buildName').value = '';
  document.getElementById('buildPrompt').value = '';
  setStep(1);
}

// ═══ Quick Deploy ═══
function loadFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => document.getElementById('quickHtml').value = e.target.result;
  reader.readAsText(file);
  // Auto-fill name from filename
  if (!document.getElementById('quickName').value) {
    document.getElementById('quickName').value = file.name.replace(/\.html?$/i, '').replace(/[-_]/g, ' ');
  }
}

async function quickDeploy() {
  const name = document.getElementById('quickName').value.trim();
  const html = document.getElementById('quickHtml').value.trim();
  if (!name) return toast('Firmenname eingeben', 'error');
  if (!html) return toast('HTML-Code eingeben oder Datei hochladen', 'error');

  const logEl = document.getElementById('quickLog');
  logEl.style.display = 'block';
  logEl.innerHTML = '';
  
  const log2 = (msg, cls) => { logEl.innerHTML += `<span class="${cls}">${msg}</span>\n`; logEl.scrollTop = logEl.scrollHeight; };
  
  log2(`▸ Deploy: ${name}`, 'info');
  log2(`▸ HTML: ${html.length} Zeichen`, 'log');
  
  try {
    const r = await fetch('/api/deploy-full', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, html })
    });
    const d = await r.json();
    if (d.success) {
      log2(`✓ ${d.action === 'created' ? 'Erstellt' : 'Aktualisiert'}: ${d.domain}`, 'ok');
      toast('Deploy erfolgreich!', 'success');
      setTimeout(loadApps, 2000);
    } else {
      log2(`✗ ${d.error || JSON.stringify(d)}`, 'err');
      toast('Deploy fehlgeschlagen', 'error');
    }
  } catch(e) { log2(`✗ ${e.message}`, 'err'); toast('Fehler', 'error'); }
}

// ═══ Init ═══
async function init() {
  try {
    const r = await fetch('/api/config'); const d = await r.json();
    const badge = document.getElementById('configBadge');
    const ok = d.coolify && d.github && d.anthropic;
    badge.textContent = ok ? 'Alles bereit' : 'Config prüfen';
    badge.className = `badge ${ok ? 'green' : ''}`;
  } catch(e) {}
  setStep(1);
  loadApps();
}
init();
</script>
